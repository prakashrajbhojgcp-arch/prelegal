services:
  backend:
    build:
      context: ./backend
    container_name: prelegal-backend
    environment:
      PRELEGAL_DATABASE_PATH: /app/data/prelegal.db
      PRELEGAL_CATALOG_PATH: /repo/config.json
      PRELEGAL_TEMPLATES_DIR: /repo/templates
      PRELEGAL_CORS_ORIGINS: '["http://localhost:3000"]'
      PRELEGAL_SESSION_SECRET: ${PRELEGAL_SESSION_SECRET:-dev-only-not-secret}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      # Mount the repo (read-only) so the backend can read config.json + templates/.
      # The SQLite DB lives inside the container under /app/data and is wiped on
      # every container start (no volume mount) — see CLAUDE.md "from scratch
      # each time".
      - ./config.json:/repo/config.json:ro
      - ./templates:/repo/templates:ro
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: prelegal-frontend
    environment:
      BACKEND_URL: http://backend:8000
      # Server Components in /dashboard/templates/<slug> read the markdown
      # body via lib/templates/loader.ts. The default is
      # `<cwd>/../templates` which doesn't exist inside the container; pin
      # to the mounted path so SSR can find the files.
      PRELEGAL_TEMPLATES_DIR: /repo/templates
    depends_on:
      - backend
    volumes:
      - ./templates:/repo/templates:ro
    ports:
      - "3000:3000"
